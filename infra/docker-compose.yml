version: "3.9"

services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cointrader:secret@postgres/cointrader
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EXCHANGE_ID=binance
      - USE_TESTNET=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: ../backend
    command: celery -A app.tasks.celery_app worker -Q trading,ai_advice,maintenance -c 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://cointrader:secret@postgres/cointrader
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EXCHANGE_ID=binance
      - USE_TESTNET=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - backend

  celery-beat:
    build: ../backend
    command: celery -A app.tasks.celery_app beat -S redbeat.RedBeatScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://cointrader:secret@postgres/cointrader
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EXCHANGE_ID=binance
      - USE_TESTNET=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - celery-worker

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=cointrader
      - POSTGRES_USER=cointrader
      - POSTGRES_PASSWORD=secret
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cointrader"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  pg_data:
  redis_data:
